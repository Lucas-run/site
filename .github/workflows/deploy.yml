name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # O deploy acontece sempre que você der merge na main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-node: 20
          cache: "npm"

      - name: Install Dependencies 📦
        run: npm install

      - name: Build 🏗️
        run: npm run build
        env:
          # o GitHub pega o Secret e injeta no Vite
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Pasta que o Vite gera
          branch: gh-pages # Branch de destino do deploy
